<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Detector de Osos IA - K8s</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Analizador de Imágenes</h1>
        <p>Sube una o varias fotos para procesar en el clúster de Kubernetes.</p>
        
        <div class="upload-box" id="drop-zone">
            <p id="status-text">Arrastra tus imágenes aquí o haz clic</p>
            <input type="file" id="file-input" multiple accept="image/*" hidden>
        </div>

        <button id="btn-upload" class="btn" disabled>Enviar al Clúster</button>

        <div id="results-area" class="results-grid">
            <!-- Aquí aparecerán los resultados -->
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
