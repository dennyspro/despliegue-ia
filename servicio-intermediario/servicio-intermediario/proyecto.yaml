# ==========================================
# 1. SERVICIO DE IA (PYTHON)
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
      - name: ai-container
        image: ai-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
spec:
  selector:
    app: ai-service
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000

# ==========================================
# 2. SERVICIO INTERMEDIARIO (JAVA)
# ==========================================
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: java-service
  template:
    metadata:
      labels:
        app: java-service
    spec:
      containers:
      - name: java-container
        image: java-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
        env:
        - name: AI_SERVICE_URL
          value: "http://ai-service:8000/predict"
---
apiVersion: v1
kind: Service
metadata:
  name: java-service
spec:
  type: NodePort
  selector:
    app: java-service
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080